<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#9333ea">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Spell Bee">
    <link rel="manifest" href="manifest.json">
    <title>Spell Bee Practice App</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-purple-100 via-pink-50 to-blue-100">
    <div class="p-4 md:p-6">
        <div class="max-w-4xl mx-auto">
            <div class="bg-white rounded-3xl shadow-2xl p-6 md:p-8 border-4 border-transparent bg-clip-padding" style="background-image: linear-gradient(white, white), linear-gradient(135deg, #667eea 0%, #764ba2 100%); background-origin: border-box; background-clip: padding-box, border-box;">
                <h1 class="text-4xl md:text-5xl font-extrabold text-center bg-gradient-to-r from-purple-600 via-pink-600 to-blue-600 bg-clip-text text-transparent mb-3">
                    🐝 Spell Bee Practice
                </h1>
                <p class="text-center text-gray-600 mb-6 text-sm md:text-lg font-medium">
                    Mobile Practice App
                </p>

                <div id="inputSection" class="space-y-4">
                    <div class="bg-gradient-to-r from-green-50 to-emerald-50 border-2 border-green-400 rounded-xl p-4 mb-4">
                        <p class="text-green-800 text-sm font-semibold flex items-center gap-2">
                            <span class="text-xl">✓</span> Ready to practice! Words and API key are preloaded.
                        </p>
                    </div>

                    <div class="border-3 border-dashed border-purple-400 rounded-2xl p-8 text-center hover:border-purple-600 transition-all bg-gradient-to-br from-purple-50 to-pink-50 shadow-inner">
                        <input type="file" accept=".txt" id="fileUpload" class="hidden"/>
                        <label for="fileUpload" class="cursor-pointer block">
                            <svg class="w-12 h-12 mx-auto text-purple-500 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/>
                            </svg>
                            <p class="text-lg font-bold text-gray-800">Upload Your Own Word List</p>
                            <p class="text-xs text-gray-600 mt-2">(Optional - or use preloaded words)</p>
                        </label>
                    </div>

                    <div class="text-center text-gray-500 font-bold">OR</div>

                    <div>
                        <textarea id="wordInput" placeholder="Add more words here (optional)" class="w-full h-32 p-4 border-3 border-purple-300 rounded-2xl focus:outline-none focus:ring-4 focus:ring-purple-300 text-base shadow-lg"></textarea>
                        <button id="loadCustomBtn" class="mt-3 w-full bg-gradient-to-r from-blue-600 to-cyan-600 text-white py-3 rounded-2xl font-bold text-base hover:from-blue-700 hover:to-cyan-700 shadow-xl transform hover:scale-105 transition">
                            📝 Add Custom Words
                        </button>
                    </div>

                    <button id="startPracticeBtn" class="w-full bg-gradient-to-r from-purple-600 to-pink-600 text-white py-4 rounded-2xl font-bold text-lg hover:from-purple-700 hover:to-pink-700 shadow-xl transform hover:scale-105 transition">
                        <span class="text-2xl mr-2">🚀</span> Start Practice with Preloaded Words
                    </button>
                </div>

                <div id="practiceSection" class="hidden space-y-4">
                    <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-3 bg-gradient-to-r from-blue-50 to-purple-50 p-4 rounded-2xl shadow-md border-2 border-purple-200">
                        <div class="flex flex-col md:flex-row items-start md:items-center gap-3 w-full md:w-auto">
                            <span id="progressText" class="text-base md:text-lg font-bold text-purple-700">Word 1 of 10</span>
                            <div class="flex items-center gap-2">
                                <span class="text-xs font-semibold text-gray-600">Go to:</span>
                                <input type="number" id="wordNumberInput" min="1" placeholder="#" class="w-14 px-2 py-1 border-2 border-purple-300 rounded-lg text-center font-bold focus:outline-none focus:ring-2 focus:ring-purple-400 text-sm"/>
                                <button id="goToWordBtn" class="bg-purple-600 text-white px-3 py-1 rounded-lg font-bold hover:bg-purple-700 transition text-xs">Go</button>
                            </div>
                        </div>
                        <div class="flex items-center gap-3 w-full md:w-auto justify-between md:justify-end">
                            <span id="timerDisplay" class="text-xl font-extrabold text-pink-600 bg-white px-3 py-2 rounded-xl shadow-md">⏱️ 0:00</span>
                            <button id="clearListBtn" class="text-red-600 hover:text-red-700 font-bold bg-red-50 px-3 py-2 rounded-xl hover:bg-red-100 transition text-xs">🗑️ Clear</button>

                                </svg>
                            </button>

                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 12h.01M12 12h.01M19 12h.01M6 12a1 1 0 11-2 0 1 1 0 012 0zm7 0a1 1 0 11-2 0 1 1 0 012 0zm7 0a1 1 0 11-2 0 1 1 0 012 0z"/>
                                </svg>
                            </button>

                        <div class="grid grid-cols-3 gap-2 justify-center mb-4 text-xs md:text-sm font-bold">
                            <span class="bg-purple-500 px-2 py-1 rounded-full">Normal</span>
                            <span class="bg-pink-500 px-2 py-1 rounded-full">Slow</span>
                            <span class="bg-blue-500 px-2 py-1 rounded-full">Extra</span>
                        </div>
                        <div id="wordDisplay">
                            <button id="showWordBtn" class="text-lg md:text-2xl underline hover:text-yellow-200 font-bold bg-white/20 px-6 py-3 rounded-2xl hover:bg-white/30 transition">Show Word</button>
                        </div>
                    </div>

                    <div id="meaningBox" class="hidden rounded-2xl p-6 bg-gradient-to-br from-blue-50 to-purple-50 shadow-xl border-2 border-purple-200">
                        <div id="partOfSpeech" class="text-base text-purple-700 font-bold mb-2"></div>
                        <p id="definition" class="text-base md:text-lg text-gray-800 leading-relaxed"></p>
                    </div>

                    <div class="grid grid-cols-2 gap-3">
                        <button id="showMeaningBtn" class="col-span-2 bg-gradient-to-r from-purple-500 to-pink-500 text-white py-3 rounded-2xl font-bold text-base hover:from-purple-600 hover:to-pink-600 shadow-lg transform hover:scale-105 transition">
                            📖 Show Meaning
                        </button>
                        
                        <button id="prevBtn" class="bg-gradient-to-r from-blue-500 to-cyan-500 text-white py-3 rounded-2xl font-bold text-sm hover:from-blue-600 hover:to-cyan-600 shadow-lg transform hover:scale-105 transition disabled:opacity-50 disabled:cursor-not-allowed disabled:transform-none">
                            ⏮️ Previous
                        </button>

                        <button id="nextBtn" class="bg-gradient-to-r from-green-500 to-emerald-500 text-white py-3 rounded-2xl font-bold text-sm hover:from-green-600 hover:to-emerald-600 shadow-lg transform hover:scale-105 transition disabled:opacity-50 disabled:cursor-not-allowed disabled:transform-none">
                            ⏭️ Next
                        </button>

                        <button id="resetBtn" class="col-span-2 bg-gradient-to-r from-orange-500 to-red-500 text-white py-3 rounded-2xl font-bold text-base hover:from-orange-600 hover:to-red-600 shadow-lg transform hover:scale-105 transition">
                            🔄 Start Over
                        </button>
                    </div>

                    <div class="bg-gradient-to-r from-blue-100 to-cyan-100 border-2 border-blue-300 rounded-2xl p-4 shadow-lg">
                        <p class="text-xs md:text-sm text-blue-900 font-semibold">
                            <span class="text-lg">💡</span> <strong>Tips:</strong> Listen to the pronunciation, try to spell it, then reveal the word!
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>

        var words = [];
        var currentIndex = 0;
        var meanings = {};
        var apiKey = PRELOADED_API_KEY;
        var timerInterval = null;
        var elapsedSeconds = 0;

        var elements = {
            inputSection: document.getElementById('inputSection'),
            practiceSection: document.getElementById('practiceSection'),
            fileUpload: document.getElementById('fileUpload'),
            wordInput: document.getElementById('wordInput'),
            loadCustomBtn: document.getElementById('loadCustomBtn'),
            startPracticeBtn: document.getElementById('startPracticeBtn'),
            progressText: document.getElementById('progressText'),
            timerDisplay: document.getElementById('timerDisplay'),
            wordNumberInput: document.getElementById('wordNumberInput'),
            goToWordBtn: document.getElementById('goToWordBtn'),
            clearListBtn: document.getElementById('clearListBtn'),
            speakBtn: document.getElementById('speakBtn'),
            speakSlowBtn: document.getElementById('speakSlowBtn'),
            speakExtraSlowBtn: document.getElementById('speakExtraSlowBtn'),
            wordDisplay: document.getElementById('wordDisplay'),
            meaningBox: document.getElementById('meaningBox'),
            partOfSpeech: document.getElementById('partOfSpeech'),
            definition: document.getElementById('definition'),
            showMeaningBtn: document.getElementById('showMeaningBtn'),
            prevBtn: document.getElementById('prevBtn'),
            nextBtn: document.getElementById('nextBtn'),
            resetBtn: document.getElementById('resetBtn')
        };

        // Start with preloaded words
        elements.startPracticeBtn.addEventListener('click', function() {
            loadWords(PRELOADED_WORDS.join('\n'));
        });

        // File upload
        elements.fileUpload.addEventListener('change', function(e) {
            var file = e.target.files[0];
            if (file) {
                var reader = new FileReader();
                reader.onload = function(event) {
                    loadWords(event.target.result);
                };
                reader.readAsText(file);
            }
        });

        // Custom words
        elements.loadCustomBtn.addEventListener('click', function() {
            var text = elements.wordInput.value;
            if (text.trim()) {
                loadWords(text);
                elements.wordInput.value = '';
            }
        });

        function loadWords(text) {
            if (typeof text === 'string') {
                words = text.split(/[\n,]/).map(function(w) { return w.trim(); }).filter(function(w) { return w.length > 0; });
            } else {
                words = text;
            }
            
            if (words.length > 0) {
                currentIndex = 0;
                meanings = {};
                elements.inputSection.classList.add('hidden');
                elements.practiceSection.classList.remove('hidden');
                updateDisplay();
                startTimer();
            }
        }

        function startTimer() {
            if (timerInterval) {
                clearInterval(timerInterval);
            }
            elapsedSeconds = 0;
            updateTimerDisplay();
            timerInterval = setInterval(function() {
                elapsedSeconds++;
                updateTimerDisplay();
            }, 1000);
        }

        function updateTimerDisplay() {
            var minutes = Math.floor(elapsedSeconds / 60);
            var seconds = elapsedSeconds % 60;
            elements.timerDisplay.textContent = '⏱️ ' + minutes + ':' + (seconds < 10 ? '0' : '') + seconds;
        }

        function updateDisplay() {
            elements.progressText.textContent = 'Word ' + (currentIndex + 1) + ' of ' + words.length;
            elements.wordDisplay.innerHTML = '<button id="showWordBtn" class="text-lg md:text-2xl underline hover:text-yellow-200 font-bold bg-white/20 px-6 py-3 rounded-2xl hover:bg-white/30 transition">Show Word</button>';
            elements.meaningBox.classList.add('hidden');
            elements.showMeaningBtn.classList.remove('hidden');
            elements.showMeaningBtn.disabled = false;
            elements.showMeaningBtn.textContent = '📖 Show Meaning';
            elements.nextBtn.disabled = currentIndex >= words.length - 1;
            elements.prevBtn.disabled = currentIndex <= 0;
            elements.wordNumberInput.max = words.length;
            elements.wordNumberInput.value = '';
            
            document.getElementById('showWordBtn').addEventListener('click', showWord);
            startTimer();
        }

        function showWord() {
            var word = words[currentIndex];
            elements.wordDisplay.innerHTML = '<div class="space-y-4"><h2 class="text-4xl md:text-6xl font-black tracking-wide drop-shadow-lg animate-pulse">' + word + '</h2></div>';
        }

        function speakWord(word, rate) {
            rate = rate || 0.8;
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                var utterance = new SpeechSynthesisUtterance(word);
                utterance.lang = 'en-US';
                utterance.rate = rate;
                utterance.pitch = 1;
                
                var voices = window.speechSynthesis.getVoices();
                var usVoice = voices.find(function(voice) {
                    return voice.lang === 'en-US' || voice.lang.startsWith('en-US');
                });
                
                if (usVoice) {
                    utterance.voice = usVoice;
                }
                
                window.speechSynthesis.speak(utterance);
            }
        }

        function fetchMeaning(word) {
            if (meanings[word]) {
                displayMeaning(word);
                return;
            }

            if (!apiKey || apiKey === 'YOUR_API_KEY_HERE') {
                meanings[word] = {
                    partOfSpeech: '',
                    definition: 'API key not configured. Please add your Merriam-Webster API key in the code.'
                };
                displayMeaning(word);
                return;
            }

            elements.showMeaningBtn.textContent = 'Loading...';
            elements.showMeaningBtn.disabled = true;

            fetch('https://www.dictionaryapi.com/api/v3/references/collegiate/json/' + word + '?key=' + apiKey)
                .then(function(response) {
                    if (!response.ok) {
                        throw new Error('HTTP ' + response.status);
                    }
                    return response.json();
                })
                .then(function(data) {
                    if (Array.isArray(data) && data.length > 0 && typeof data[0] === 'object') {
                        var entry = data[0];
                        meanings[word] = {
                            partOfSpeech: entry.fl || '',
                            definition: (entry.shortdef && entry.shortdef[0]) || 'Definition not found'
                        };
                    } else {
                        meanings[word] = {
                            partOfSpeech: '',
                            definition: 'Word not found in dictionary'
                        };
                    }
                    displayMeaning(word);
                    elements.showMeaningBtn.classList.add('hidden');
                })
                .catch(function(error) {
                    meanings[word] = {
                        partOfSpeech: '',
                        definition: 'Error: ' + error.message
                    };
                    displayMeaning(word);
                    elements.showMeaningBtn.classList.add('hidden');
                });
        }

        function displayMeaning(word) {
            var meaning = meanings[word];
            elements.partOfSpeech.textContent = meaning.partOfSpeech;
            elements.definition.textContent = meaning.definition;
            elements.meaningBox.classList.remove('hidden');
            
            var textToSpeak = '';
            if (meaning.partOfSpeech) {
                textToSpeak = meaning.partOfSpeech + '. ';
            }
            textToSpeak += meaning.definition;
            
            speakWord(textToSpeak, 0.5);
        }

        elements.speakBtn.addEventListener('click', function() {
            speakWord(words[currentIndex]);
        });

        elements.speakSlowBtn.addEventListener('click', function() {
            speakWord(words[currentIndex], 0.2);
        });

        elements.speakExtraSlowBtn.addEventListener('click', function() {
            speakWord(words[currentIndex], 0.005);
        });

        elements.showMeaningBtn.addEventListener('click', function() {
            fetchMeaning(words[currentIndex]);
        });

        elements.goToWordBtn.addEventListener('click', function() {
            var wordNum = parseInt(elements.wordNumberInput.value);
            if (wordNum && wordNum >= 1 && wordNum <= words.length) {
                currentIndex = wordNum - 1;
                updateDisplay();
            }
        });

        elements.wordNumberInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                elements.goToWordBtn.click();
            }
        });

        elements.prevBtn.addEventListener('click', function() {
            if (currentIndex > 0) {
                currentIndex--;
                updateDisplay();
            }
        });
        
        elements.nextBtn.addEventListener('click', function() {
            if (currentIndex < words.length - 1) {
                currentIndex++;
                updateDisplay();
            }
        });

        elements.resetBtn.addEventListener('click', function() {
            currentIndex = 0;
            updateDisplay();
        });

        elements.clearListBtn.addEventListener('click', function() {
            words = [];
            meanings = {};
            if (timerInterval) {
                clearInterval(timerInterval);
            }
            elements.practiceSection.classList.add('hidden');
            elements.inputSection.classList.remove('hidden');
        });

        // Service Worker Registration for PWA
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function() {
                navigator.serviceWorker.register('sw.js').then(function(registration) {
                    console.log('ServiceWorker registered');
                }, function(err) {
                    console.log('ServiceWorker registration failed: ', err);
                });
            });
        }
    </script>
</body>
</html>
